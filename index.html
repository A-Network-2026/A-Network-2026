<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Network</title>
<link rel="icon" type="image/png" href="logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Orbitron',sans-serif;background:#000814;color:#fff;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
header,.hero,.section,footer{position:relative;z-index:1}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,150,255,.3)}
header img{width:50px}
nav a{margin-left:25px;color:#00c3ff;text-decoration:none}
.hero{height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero img{width:180px;filter:drop-shadow(0 0 25px #00c3ff)}
.hero h1{font-size:48px}
.btn{margin-top:20px;padding:12px 30px;border:none;border-radius:30px;background:linear-gradient(90deg,#00c3ff,#0066ff);color:#fff}
.section{padding:80px 40px;text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:40px}
.card{background:rgba(0,0,0,.6);border:1px solid rgba(0,150,255,.2);padding:25px;border-radius:15px}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
<img src="logo.png" />
<nav>
<a href="#">About</a>
<a href="#">Features</a>
<a href="#">Chart</a>
</nav>
</header>

<section class="hero">
<img src="logo.png" />
<h1>A NETWORK</h1>
<p>Decentralized ecosystem for payments and tokenization</p>
<button class="btn">Get Started</button>
</section>

<script>
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;

let angle=0;
let trail1=[],trail2=[];

function drawGlobe(x,y,r,offset,trail){
ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle='#00c3ff';ctx.stroke();

let ax=x+Math.cos(angle+offset)*r*0.6;
let ay=y+Math.sin(angle+offset)*r*0.6;

trail.push({x:ax,y:ay,life:1});

// draw trail line
ctx.beginPath();
for(let i=0;i<trail.length;i++){
let p=trail[i];
if(i===0)ctx.moveTo(p.x,p.y);
else ctx.lineTo(p.x,p.y);
p.life*=0.96;
}
ctx.strokeStyle='rgba(0,195,255,0.8)';
ctx.lineWidth=2;
ctx.stroke();

trail=trail.filter(p=>p.life>0.05);

// A circle
ctx.beginPath();ctx.arc(ax,ay,14,0,Math.PI*2);
ctx.strokeStyle='#00c3ff';ctx.stroke();
ctx.fillStyle='#00c3ff';ctx.font='bold 14px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('A',ax,ay);

return trail;
}

function energyBeam(x1,y1,x2,y2){
let t=(Math.sin(angle*3)+1)/2;
let px=x1+(x2-x1)*t;
let py=y1+(y2-y1)*t;

// base line
ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.strokeStyle='rgba(0,195,255,0.2)';
ctx.stroke();

// moving energy
let grad=ctx.createLinearGradient(x1,y1,x2,y2);
grad.addColorStop(0,'transparent');
grad.addColorStop(t,'#00c3ff');
grad.addColorStop(1,'transparent');

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.strokeStyle=grad;
ctx.lineWidth=4;
ctx.stroke();

// pulse node
ctx.beginPath();
ctx.arc(px,py,6,0,Math.PI*2);
ctx.fillStyle='#00c3ff';
ctx.fill();
}

function animate(){
ctx.fillStyle='rgba(0,8,20,0.3)';
ctx.fillRect(0,0,c.width,c.height);

let x1=c.width*0.3,y1=c.height*0.5;
let x2=c.width*0.7,y2=c.height*0.5;

trail1=drawGlobe(x1,y1,80,0,trail1);
trail2=drawGlobe(x2,y2,80,2,trail2);

energyBeam(x1,y1,x2,y2);

angle+=0.01;
requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
