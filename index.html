<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Network</title>

<link rel="icon" type="image/png" href="logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000814;
  color:#fff;
  overflow-x:hidden;
  line-height:1.6;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

header,.hero,.section{position:relative;z-index:1}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:clamp(15px,3vw,30px) clamp(20px,5vw,60px);
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,150,255,.3);
}

header img{
  width:clamp(40px,5vw,60px);
}

nav a{
  margin-left:clamp(10px,2vw,25px);
  color:#00c3ff;
  text-decoration:none;
  font-size:clamp(12px,1.5vw,16px);
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:clamp(20px,5vw,60px);
}

.hero video{
  width:clamp(160px,25vw,280px);
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,195,255,.6);
}

.hero h1{
  font-size:clamp(26px,5vw,52px);
  margin-top:15px;
}

.hero p{
  max-width:clamp(280px,80vw,700px);
  font-size:clamp(13px,1.8vw,16px);
  opacity:.85;
  margin-top:10px;
}

/* BUTTON */
.btn{
  margin-top:12px;
  padding:clamp(10px,2vw,14px) clamp(20px,4vw,28px);
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00c3ff,#0066ff);
  color:#fff;
  cursor:pointer;
  font-size:clamp(13px,1.5vw,15px);
}

/* METRICS */
.metrics{
  display:flex;
  gap:clamp(10px,2vw,20px);
  margin-top:25px;
  flex-wrap:wrap;
  justify-content:center;
}

.metric{
  background:rgba(0,0,0,.5);
  border:1px solid rgba(0,195,255,.3);
  padding:clamp(12px,2vw,18px);
  border-radius:12px;
  min-width:clamp(110px,30vw,160px);
}

.metric h3{color:#00c3ff}

/* SECTION */
.section{
  padding:clamp(40px,8vw,80px) 20px;
  text-align:center;
}

/* CHART */
.chart-box{
  width:100%;
  max-width:1000px;
  margin:0 auto;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(0,195,255,.4);
}

.chart-box iframe{
  width:100%;
  height:clamp(300px,60vh,600px);
  border:none;
}

/* LINKS */
.links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.links a{
  color:#00c3ff;
  text-decoration:none;
  border:1px solid rgba(0,195,255,.3);
  padding:10px 15px;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <img src="logo.png">
  <nav>
    <a href="#chart">Chart</a>
    <a href="#social">Social</a>
  </nav>
</header>

<section class="hero">
  <video src="video.mp4" autoplay muted loop playsinline></video>
  <h1>A NETWORK</h1>
  <p>AI-powered decentralized infrastructure evolving Web2 → Web3 → Web4.</p>

  <button class="btn" onclick="connectWallet()">Connect Wallet</button>
  <button class="btn" onclick="getBalance()">Check Balance</button>
  <button class="btn" onclick="getPrice()">Get Price</button>

  <div class="metrics">
    <div class="metric"><h3 id="wallet">Not Connected</h3><p>Wallet</p></div>
    <div class="metric"><h3 id="balance">-</h3><p>ANET</p></div>
    <div class="metric"><h3 id="price">-</h3><p>USD</p></div>
  </div>
</section>

<section id="chart" class="section">
  <h2 style="color:#00c3ff;margin-bottom:20px">Live DEX Chart</h2>
  <div class="chart-box">
    <iframe src="https://dexscreener.com/bsc/0xb90071e377a31a6ea2cfdebe19a4d5226c420b6b?embed=1&theme=dark"></iframe>
  </div>
</section>

<section id="social" class="section">
  <h2 style="color:#00c3ff;margin-bottom:20px">Official Channels</h2>
  <div class="links">
    <a href="https://x.com/AAlphaNetwork" target="_blank">Official X</a>
    <a href="https://github.com/A-Network-2026" target="_blank">GitHub</a>
  </div>
</section>

<script>
// BACKGROUND
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();window.addEventListener('resize',resize);

let nodes=[];
for(let i=0;i<80;i++){
  nodes.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*0.3,vy:(Math.random()-.5)*0.3});
}

function animate(){
  ctx.fillStyle='rgba(0,8,20,.5)';
  ctx.fillRect(0,0,c.width,c.height);

  nodes.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>c.width)n.vx*=-1;
    if(n.y<0||n.y>c.height)n.vy*=-1;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle='#00c3ff';
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

// WEB3 FIXED
let provider, signer, userAddress;
const tokenAddress = "0x791055A7d52AA392eaE8De04250497f33807E46A";

const abi = [
  "function balanceOf(address owner) view returns (uint256)",
  "function decimals() view returns (uint8)"
];

async function connectWallet(){
  if(!window.ethereum){
    alert("Install MetaMask");
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);

  try{
    await provider.send("eth_requestAccounts", []);

    await provider.send("wallet_switchEthereumChain", [
      { chainId: "0x38" }
    ]);

  } catch (err){
    if(err.code === 4902){
      await provider.send("wallet_addEthereumChain", [{
        chainId:"0x38",
        chainName:"Binance Smart Chain",
        nativeCurrency:{name:"BNB",symbol:"BNB",decimals:18},
        rpcUrls:["https://bsc-dataseed.binance.org/"],
        blockExplorerUrls:["https://bscscan.com"]
      }]);
    } else {
      console.error(err);
      return;
    }
  }

  signer = provider.getSigner();
  userAddress = await signer.getAddress();

  document.getElementById("wallet").innerText =
    userAddress.slice(0,6)+"..."+userAddress.slice(-4);
}

async function getBalance(){
  try{
    if(!provider) return alert("Connect wallet first");

    const network = await provider.getNetwork();
    if(network.chainId !== 56){
      alert("Switch to BSC network");
      return;
    }

    const contract = new ethers.Contract(tokenAddress, abi, provider);
    const balance = await contract.balanceOf(userAddress);
    const decimals = await contract.decimals();

    document.getElementById("balance").innerText =
      ethers.utils.formatUnits(balance, decimals);

  } catch(e){
    console.error(e);
    alert("Failed to fetch balance");
  }
}

async function getPrice(){
  try{
    const res = await fetch("https://api.dexscreener.com/latest/dex/pairs/bsc/0xb90071e377a31a6ea2cfdebe19a4d5226c420b6b");
    const data = await res.json();

    document.getElementById("price").innerText =
      "$" + parseFloat(data.pair.priceUsd).toFixed(4);

  } catch(e){
    console.error(e);
  }
}

// reload on network change
if(window.ethereum){
  window.ethereum.on('chainChanged', () => location.reload());
}
</script>

</body>
</html>
